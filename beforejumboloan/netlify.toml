# Before Jumbo Loan — multi-market Strategy Studio
# One engine (js/engine.js, MARKETS registry) served per route.
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Market routes → same page; the engine resolves the slug from the path.
[[redirects]]
  from = "/key-west"
  to = "/scenario-studio.html"
  status = 200
[[redirects]]
  from = "/palm-beach"
  to = "/scenario-studio.html"
  status = 200
[[redirects]]
  from = "/miami-dade"
  to = "/scenario-studio.html"
  status = 200
[[redirects]]
  from = "/california"
  to = "/scenario-studio.html"
  status = 200
[[redirects]]
  from = "/orange-county"
  to = "/scenario-studio.html"
  status = 200
[[redirects]]
  from = "/los-angeles"
  to = "/scenario-studio.html"
  status = 200
[[redirects]]
  from = "/scenario-studio"
  to = "/scenario-studio.html"
  status = 200

# Secondary domain → primary (configure both domains on the Netlify site).
[[redirects]]
  from = "https://beforejumboloans.com/*"
  to = "https://beforejumboloan.com/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://www.beforejumboloans.com/*"
  to = "https://beforejumboloan.com/:splat"
  status = 301
  force = true
